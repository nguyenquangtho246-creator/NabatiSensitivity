<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabati Sensitivity | OB 53</title>

<link rel="icon" type="image/webp" href="https://files.catbox.moe/j5ejn5.webp">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --card: rgba(0, 0, 0, 0.75); /* Nền đen trong suốt để nổi bật ảnh nền */
  --text: #fff;
  --accent: #00c6ff;
  --accent2: #ff7b00;
  --gray: #555;
  --green: #2ecc71;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  /* Thiết lập ảnh nền chuẩn */
  background-image: url('https://files.catbox.moe/k481l5.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  background-repeat: no-repeat;
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Chữ nghệ thuật 2 bên - Cân bằng đối xứng */
.side-text {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Dancing Script', cursive;
  font-size: 45px;
  color: var(--accent);
  line-height: 1.4;
  z-index: 0;
  pointer-events: none;
  filter: drop-shadow(0 0 10px rgba(0, 198, 255, 0.5));
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.left-side { left: 5%; text-align: left; }
.right-side { right: 5%; text-align: right; }

@media (max-width: 1100px) { 
    .side-text { display: none; } 
}

/* UI Card chính */
.center {
  width: 100%;
  max-width: 550px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.card {
  background: var(--card);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px); /* Hiệu ứng mờ kính cực đẹp */
  margin-bottom: 20px;
}

.tabs { display: flex; gap: 10px; margin-bottom: 15px; }
.tab {
  flex: 1;
  text-align: center;
  padding: 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 600;
  font-size: 14px;
}
.tab.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0, 0, 0, 0.5);
  color: white;
  outline: none;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(45deg, var(--accent), var(--accent2));
  color: white;
  font-weight: bold;
  text-transform: uppercase;
  transition: 0.3s;
}
button:hover { transform: scale(1.02); opacity: 0.9; }

/* Dropdown */
.dropdown { margin-top: 10px; }
.dropbtn {
  padding: 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.dropbtn::after { content: "▼"; font-size: 12px; }
.menu { display: none; background: #1a1a1a; border-radius: 10px; margin-top: 5px; overflow: hidden; }
.menu div { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; }
.menu div:hover { background: var(--accent); }
.show { display: block; }

/* Kết quả */
.res-head { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 15px;}
.btn-rs { width: auto; margin-top: 0; padding: 6px 15px; font-size: 12px; background: #444; }

.slider { height: 8px; background: #333; border-radius: 10px; margin: 8px 0 15px; overflow: hidden; }
.bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

/* Lock & Toast */
.lock {
  position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
  display: flex; justify-content: center; align-items: center;
  border-radius: 20px; top: 0; left: 0; z-index: 5;
}
#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--accent2); color: white; padding: 12px 25px;
  border-radius: 30px; display: none; z-index: 1000;
  box-shadow: 0 0 20px rgba(255,123,0,0.5);
}

.loop-toggle {
  width: 35px; height: 35px; border-radius: 8px;
  background: var(--gray); display: flex; align-items: center;
  justify-content: center; cursor: pointer;
}
.loop-toggle.on { background: var(--green); }
.loop-icon {
  width: 16px; height: 16px; border: 2px solid white;
  border-radius: 50%; border-top-color: transparent;
  position: relative;
}
</style>
</head>

<body oncontextmenu="return false">

<div id="toast">Hãy Bấm Tạo Lại Để Tạo Công Thức Độ Nhạy Mới</div>

<div class="side-text left-side">Nabati 🧀<br>Sensitivity<br>VIP</div>
<div class="side-text right-side">Nabati 🧀<br>Live<br>OB 53</div>

<div class="center">
    <div id="keyBox" class="card">
      <h3 style="text-align:center; margin-bottom:15px; font-size:16px;">XÁC MINH NGƯỜI DÙNG</h3>
      <input id="keyInput" type="password" placeholder="Nhập Key để tiếp tục...">
      <button onclick="_checkKey()">Xác nhận 🔑</button>
    </div>

    <div id="mainApp" style="display:none">
      <div class="tabs">
        <div class="tab active" onclick="_sw('ff')">Free Fire TH</div>
        <div class="tab" onclick="_sw('max')">FreeFire MAX</div>
      </div>

      <div id="ff">
        <div class="card">
          <div class="dropdown">
            <div class="dropbtn" onclick="_tg('m1', this)" id="o1">Chọn hệ điều hành</div>
            <div class="menu" id="m1">
              <div onclick="_os('Android',1)">Android</div>
              <div onclick="_os('IOS',1)">IOS</div>
            </div>
          </div>
          <input id="d1" placeholder="Nhập Hãng Máy Và Tên Máy" oninput="_auto(1)">
          <button onclick="_g(1)">Tạo Công Thức 🎯</button>
          <div id="out1"></div>
        </div>
      </div>

      <div id="max" style="display:none">
        <div class="card" style="position:relative">
          <div id="lock" class="lock">
            <div style="text-align:center">
              <p style="margin-bottom:15px">100k Tim Và 20 Xu</p>
              <button onclick="_u()" style="width: auto; padding: 10px 30px;">Mở 🔓</button>
            </div>
          </div>
          <div class="dropdown">
            <div class="dropbtn" onclick="_tg('m2', this)" id="o2">Chọn Hệ Điều Hành</div>
            <div class="menu" id="m2">
              <div onclick="_os('Android',2)">Android</div>
              <div onclick="_os('IOS',2)">IOS</div>
            </div>
          </div>
          <input id="d2" placeholder="Nhập Hãng Máy Và Tên Máy" oninput="_auto(2)">
          <button onclick="_g(2)">Tạo Công Thức 🎯</button>
          <div id="out2"></div>
        </div>
      </div>
    </div>
</div>

<script>
(function(){
    const _k = atob("TkFCQVRJX0RFUF9UUkFJ");
    let _a="", _b="", _c=0, _d=0, _autoReset = false;

    // Chặn phím F12, Ctrl+U
    document.addEventListener("keydown", e => {
      if(e.key==="F12" || (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) || (e.ctrlKey && e.key==="u")) e.preventDefault();
    });

    if(localStorage.getItem("dbao_key") === _k){
      keyBox.style.display="none"; mainApp.style.display="block";
    }

    window._checkKey = () => {
      if(document.getElementById("keyInput").value.trim() === _k){
        localStorage.setItem("dbao_key", _k);
        keyBox.style.display="none"; mainApp.style.display="block";
      } else alert("Sai Key!");
    };

    window._sw = t => {
      document.getElementById('ff').style.display = t === 'ff' ? 'block' : 'none';
      document.getElementById('max').style.display = t === 'max' ? 'block' : 'none';
      document.querySelectorAll(".tab").forEach((e, i) => {
        e.classList.toggle("active", (t === 'ff' && i === 0) || (t === 'max' && i === 1));
      });
    };

    window._tg = (id, btn) => {
      document.getElementById(id).classList.toggle("show");
    };

    window._os = (v, n) => {
      if(n===1) { _a=v; o1.innerText=v; m1.classList.remove("show"); }
      else { _b=v; o2.innerText=v; m2.classList.remove("show"); }
      let input = n===1 ? d1 : d2;
      input.value = (v === "IOS") ? "iPhone " : "";
      input.focus();
    };

    window._auto = (n) => {
      let input = n === 1 ? d1 : d2;
      let os = n === 1 ? _a : _b;
      if(os !== "Android") return;
      let val = input.value.toLowerCase();
      const map = { "sa": "Samsung ", "op": "Oppo ", "re": "Redmi ", "rea": "Realme ", "vi": "Vivo " };
      for (let key in map) { if (val === key) { input.value = map[key]; break; } }
    };

    const _r = (x,y) => Math.floor(Math.random()*(y-x+1))+x;

    window._g = t => {
      if(!_autoReset && ((t===1 && _c) || (t===2 && _d))) {
        const toast = document.getElementById("toast");
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 3000);
        return;
      }
      let o = (t===1) ? _a : _b;
      let dev = (t===1) ? d1.value : d2.value;
      let out = (t===1) ? out1 : out2;

      if(!o || !dev || dev.length < 3) { alert("Vui lòng nhập đầy đủ!"); return; }

      let dt = {
        l: _r(160,200), r: _r(100,180), x2: _r(100,170), 
        x4: _r(150,190), s: _r(150,200), c: _r(0,50)
      };
      const nm = {l:"Nhìn Xung Quanh", r:"Ống Ngắm Hồng Tâm", x2:"Ống Ngắm X2", x4:"Ống Ngắm X4", s:"Ống Ngắm Súng Ngắm", c:"Camera Nhìn Xung Quanh"};

      let h = `<div class="res-head"><h3>${dev}</h3><button class="btn-rs" onclick="_rs(${t})">Làm mới</button></div>`;
      for(let k in dt){
        h += `<p style="font-size:12px">${nm[k]}: ${dt[k]}</p><div class="slider"><div class="bar" style="width:${dt[k]/2}%"></div></div>`;
      }
      h += `<p style="text-align:center; color:var(--accent2)"><b>Nút bắn:</b> ${_r(40,60)}% | <b>DPI:</b> ${o==="Android"?_r(400,600):"400-600"}</p>`;
      
      out.innerHTML = h;
      t===1 ? _c=1 : _d=1;
    };

    window._rs = t => {
      if(t===1) { out1.innerHTML=""; _c=0; }
      else { out2.innerHTML=""; _d=0; }
    };

    window._u = () => { if(confirm("Xác nhận mở khóa FF MAX?")) lock.style.display="none"; };
})();
</script>
</body>
</html>
